  </head>

    <script src="./js/log/logPanel.js?v=20260401"></script>
    <script src="./js/data/trait_samples.js"></script>
    <script src="./js/stuff_describe/equipment.js"></script>
    <script src="./js/stuff_describe/gong_fa.js"></script>
    <script src="./js/stuff_describe/spirit_stone.js"></script>
    <script src="./js/stuff_describe/pill.js"></script>
    <script src="./js/stuff_describe/common_stuff.js"></script>
    <script src="./js/data/mjCreationConfig.js"></script>
    <script src="./js/data/realm_state.js"></script>
    <script src="./js/data/leegen_state.js"></script>
    <script src="./js/game/player_base_runtime.js"></script>

    <!-- 结构对齐 ref_html/index.html 启动段 -->
    <div id="splash-screen">
      <div id="splash-bg" aria-hidden="true"></div>

      <div id="splash-content">
        <h1 id="splash-title">凡人修仙传</h1>
        <p id="splash-info">作者: KAI&nbsp;&nbsp;|&nbsp;&nbsp;版本: 1.2.0</p>

        <div id="splash-buttons">
          <button class="splash-btn" id="start-new-life-btn" type="button">开始新人生</button>
          <button class="splash-btn" id="load-life-btn" type="button">读取人生</button>
          <button class="splash-btn" id="api-settings-btn" type="button" onclick="window.MjSplash && window.MjSplash.openApiSettings && window.MjSplash.openApiSettings()">API设置</button>
        </div>
      </div>
    </div>

    <!-- API 设置弹窗（仅写入 localStorage，供 main.html 的 bridge.js 读取覆盖） -->
    <div id="api-settings-root" class="splash-modal-root hidden" aria-hidden="true">
      <div class="splash-modal-backdrop" data-api-settings-close tabindex="-1"></div>
      <div class="splash-modal" role="dialog" aria-modal="true" aria-labelledby="api-settings-title">
        <button type="button" class="splash-modal-close" data-api-settings-close aria-label="关闭">×</button>
        <h3 id="api-settings-title" class="splash-modal-title">API 设置</h3>
        <p class="splash-modal-sub">填写后会保存到本机浏览器存储，不会上传到服务器，放心填写。</p>

        <div class="splash-form">
          <label class="splash-field">
            <span class="splash-field-k">API URL</span>
            <input id="api-url-input" class="splash-field-input" type="text" placeholder="https://api.example.com/v1" />
          </label>
          <label class="splash-field">
            <span class="splash-field-k">API Key</span>
            <input id="api-key-input" class="splash-field-input" type="password" placeholder="sk-..." />
          </label>
          <label class="splash-field">
            <span class="splash-field-k">模型</span>
            <input id="api-model-input" class="splash-field-input" type="text" placeholder="gpt-4.1-mini" />
          </label>
        </div>

        <div class="splash-modal-actions">
          <button type="button" class="splash-btn splash-btn--secondary" id="api-settings-clear-btn">清除</button>
          <button type="button" class="splash-btn splash-btn--secondary" id="api-settings-test-btn">测试</button>
          <button type="button" class="splash-btn" id="api-settings-save-btn">保存</button>
        </div>
        <div id="api-settings-status" class="splash-modal-status" aria-live="polite"></div>
      </div>
    </div>

    <!-- 读取人生：存档列表弹窗 -->
    <div id="save-load-root" class="splash-modal-root hidden" aria-hidden="true">
      <div class="splash-modal-backdrop" data-save-load-close tabindex="-1"></div>
      <div class="splash-modal" role="dialog" aria-modal="true" aria-labelledby="save-load-title">
        <button type="button" class="splash-modal-close" data-save-load-close aria-label="关闭">×</button>
        <h3 id="save-load-title" class="splash-modal-title">读取人生</h3>
        <p class="splash-modal-sub">选择一个存档继续修行（存档保存在本机浏览器中）。</p>
        <div id="save-load-list" class="save-load-list"></div>
        <div class="splash-modal-actions">
          <button type="button" class="splash-btn splash-btn--secondary" id="save-load-refresh-btn">刷新</button>
          <button type="button" class="splash-btn splash-btn--secondary" id="save-load-delete-all-btn">清空</button>
        </div>
        <div id="save-load-status" class="splash-modal-status" aria-live="polite"></div>
      </div>
    </div>

    <!-- 自定义对话框：替代浏览器 confirm/prompt（可美化） -->
    <div id="mj-dialog-root" class="mj-dialog-root hidden" aria-hidden="true">
      <div class="mj-dialog-backdrop" data-mj-dialog-close tabindex="-1"></div>
      <div class="mj-dialog" role="dialog" aria-modal="true" aria-labelledby="mj-dialog-title">
        <button type="button" class="mj-dialog-close" data-mj-dialog-close aria-label="关闭">×</button>
        <h3 id="mj-dialog-title" class="mj-dialog-title"></h3>
        <div id="mj-dialog-message" class="mj-dialog-message"></div>
        <div id="mj-dialog-field" class="mj-dialog-field hidden">
          <input id="mj-dialog-input" class="mj-dialog-input" type="text" />
          <div id="mj-dialog-hint" class="mj-dialog-message hidden" aria-live="polite"></div>
        </div>
        <div class="mj-dialog-actions">
          <button type="button" class="splash-btn splash-btn--secondary" id="mj-dialog-cancel-btn">取消</button>
          <button type="button" class="splash-btn" id="mj-dialog-ok-btn">确定</button>
        </div>
      </div>
    </div>

    <!-- 对齐 ref_html/index.html #character-creation-screen（开辟鸿蒙 / 命运抉择） -->
    <div id="character-creation-screen" class="hidden" aria-hidden="true">
      <div class="creation-container">
        <div class="creation-step-indicator" id="creation-step-indicator"></div>
        <div class="creation-content" id="creation-content"></div>
        <div class="creation-nav" id="creation-nav"></div>
      </div>
    </div>

    <!-- 命运抉择 · 天赋详情（与 main.html 同款样式，z-index 高于 #character-creation-screen） -->
    <div id="mj-trait-detail-root" class="mj-trait-modal-root hidden" aria-hidden="true">
      <div class="mj-trait-modal-backdrop" data-mj-trait-modal-close tabindex="-1"></div>
      <div class="mj-trait-modal" role="dialog" aria-modal="true" aria-labelledby="mj-trait-modal-title">
        <button type="button" class="mj-trait-modal-close" data-mj-trait-modal-close aria-label="关闭">×</button>
        <h4 id="mj-trait-modal-title" class="mj-trait-modal-title"></h4>
        <div id="mj-trait-modal-rarity" class="mj-trait-modal-rarity"></div>
        <div id="mj-trait-modal-body" class="mj-trait-modal-body"></div>
      </div>
    </div>

    <!-- fateChoice 依赖上文脚本；须在本页 #mj-trait-detail-root 之后加载，否则天赋弹窗关闭无法绑定 -->
    <script src="./js/ui/fateChoiceController.js"></script>

    <script>
      (function () {
        "use strict";
        var API_OVERRIDE_KEY = "IMMORTAL_ST_BRIDGE_API_OVERRIDE_V1";
        var SAVE_INDEX_KEY = "MJ_SAVES_INDEX_V1";
        var SAVE_PREFIX = "MJ_SAVE_V1:";
        var ACTIVE_SAVE_ID_KEY = "MJ_ACTIVE_SAVE_ID_V1";
        var BOOTSTRAP_KEY = "mortal_journey_bootstrap_v1";

        function qs(id) {
          return document.getElementById(id);
        }

        function isApiConfigured() {
          try {
            var raw = localStorage.getItem(API_OVERRIDE_KEY);
            if (!raw) return false;
            var o = JSON.parse(raw);
            if (!o || typeof o !== "object") return false;
            var apiUrl = o.apiUrl != null ? String(o.apiUrl).trim() : "";
            var model = o.model != null ? String(o.model).trim() : "";
            var apiKey = o.apiKey != null ? String(o.apiKey).trim() : "";
            // url / model 必填；apiKey 默认必填（除非是本地代理等无鉴权场景）
            if (!apiUrl || !model) return false;
            // 避免把占位符当配置完成
            if (/example\.com/i.test(apiUrl)) return false;
            var isLocal =
              /^https?:\/\/(localhost|127\.0\.0\.1)(:\d+)?(\/|$)/i.test(apiUrl) ||
              /^https?:\/\/0\.0\.0\.0(:\d+)?(\/|$)/i.test(apiUrl);
            if (!isLocal && !apiKey) return false;
            return true;
          } catch (_e) {
            return false;
          }
        }

        function refreshApiGateUi() {
          var ok = isApiConfigured();
          var startBtn = qs("start-new-life-btn");
          var loadBtn = qs("load-life-btn");
          var tip = ok ? "" : "请先在「API设置」中配置 API URL / Key / 模型（本地代理可不填 Key）。";
          if (startBtn) {
            startBtn.disabled = !ok;
            if (!ok) startBtn.setAttribute("title", tip);
            else startBtn.removeAttribute("title");
          }
          if (loadBtn) {
            loadBtn.disabled = !ok;
            if (!ok) loadBtn.setAttribute("title", tip);
            else loadBtn.removeAttribute("title");
          }
        }

        function openApiSettings() {
          var root = qs("api-settings-root");
          if (!root) return;
          var st = qs("api-settings-status");
          if (st) st.textContent = "";
          try {
            var raw = localStorage.getItem(API_OVERRIDE_KEY);
            var data = raw ? JSON.parse(raw) : null;
            if (data && typeof data === "object") {
              var u = qs("api-url-input");
              var k = qs("api-key-input");
              var m = qs("api-model-input");
              if (u) u.value = data.apiUrl != null ? String(data.apiUrl) : "";
              if (k) k.value = data.apiKey != null ? String(data.apiKey) : "";
              if (m) m.value = data.model != null ? String(data.model) : "";
            }
          } catch (_e) {
            /* 忽略 */
          }
          root.classList.remove("hidden");
          root.setAttribute("aria-hidden", "false");
          document.body.style.overflow = "hidden";
          var u2 = qs("api-url-input");
          if (u2) u2.focus();
        }

        // 供 HTML inline onclick 兜底（GitHub Pages 某些缓存/脚本时序问题时仍可打开）
        try {
          window.MjSplash = window.MjSplash || {};
          window.MjSplash.openApiSettings = openApiSettings;
        } catch (_e) {
          /* 忽略 */
        }

        function closeApiSettings() {
          var root = qs("api-settings-root");
          if (!root) return;
          root.classList.add("hidden");
          root.setAttribute("aria-hidden", "true");
          document.body.style.overflow = "";
        }

        function setStatus(msg, ok) {
          var el = qs("api-settings-status");
          if (!el) return;
          el.textContent = msg != null ? String(msg) : "";
          el.className = "splash-modal-status" + (ok ? " splash-modal-status--ok" : " splash-modal-status--bad");
        }

        function normalizeBaseUrl(url) {
          var clean = String(url || "").trim().replace(/\/+$/, "");
          if (!clean) return "";
          if (!/\/v\d+$/i.test(clean)) clean += "/v1";
          return clean;
        }

        function safeJsonParse(raw, fallback) {
          try {
            return JSON.parse(raw);
          } catch (_e) {
            return fallback;
          }
        }

        function logToPanels(prefix, obj) {
          try {
            console.info(prefix, obj);
            if (window.GameLog && typeof window.GameLog.info === "function") {
              window.GameLog.info(prefix + "\n" + JSON.stringify(obj, null, 2));
            }
          } catch (_e) {
            /* 忽略 */
          }
        }

        function testApiSettings() {
          var apiUrl = String((qs("api-url-input") && qs("api-url-input").value) || "").trim();
          var apiKey = String((qs("api-key-input") && qs("api-key-input").value) || "").trim();
          var model = String((qs("api-model-input") && qs("api-model-input").value) || "").trim();
          if (!apiUrl || !model) {
            setStatus("请先填写 API URL 与模型，再测试。", false);
            return;
          }
          var testBtn = qs("api-settings-test-btn");
          if (testBtn) testBtn.disabled = true;
          setStatus("正在测试连接…", true);
          var started = Date.now();
          var base = normalizeBaseUrl(apiUrl);
          var url = base + "/chat/completions";
          var headers = { "Content-Type": "application/json" };
          if (apiKey) headers.Authorization = "Bearer " + apiKey;
          var body = {
            model: model,
            messages: [{ role: "user", content: "ping" }],
            stream: false,
            temperature: 0,
            max_tokens: 8,
          };
          // 120s 超时，避免卡死
          var ac = new AbortController();
          var tid = window.setTimeout(function () {
            try {
              ac.abort("timeout");
            } catch (_e) {}
          }, 120000);
          fetch(url, { method: "POST", headers: headers, body: JSON.stringify(body), signal: ac.signal })
            .then(function (res) {
              if (!res.ok) {
                return res
                  .text()
                  .then(function (t) {
                    throw new Error("HTTP " + res.status + "：" + (t || "unknown error"));
                  });
              }
              return res.text();
            })
            .then(function (txt) {
              window.clearTimeout(tid);
              var ms = Date.now() - started;
              var data = safeJsonParse(txt, null);
              var content = "";
              if (data && data.choices && data.choices[0] && data.choices[0].message) {
                content = data.choices[0].message.content != null ? String(data.choices[0].message.content) : "";
              }
              setStatus("测试成功（" + (ms / 1000).toFixed(2) + "s）：" + (content || "已收到响应"), true);
              logToPanels("[API测试] 成功", { apiUrl: apiUrl, model: model, ms: ms, preview: String(txt).slice(0, 500) });
            })
            .catch(function (err) {
              window.clearTimeout(tid);
              var ms2 = Date.now() - started;
              var msg = err && err.message ? String(err.message) : "未知错误";
              var isAbort =
                (err && (err.name === "AbortError" || err.code === "ABORT_ERR")) ||
                /aborted/i.test(msg);
              if (isAbort) msg = "测试超时（20 秒未收到响应）";
              setStatus("测试失败（" + (ms2 / 1000).toFixed(2) + "s）： " + msg.slice(0, 240), false);
              logToPanels("[API测试] 失败", { apiUrl: apiUrl, model: model, ms: ms2, error: msg });
            })
            .finally(function () {
              if (testBtn) testBtn.disabled = false;
            });
        }

        function saveApiSettings() {
          var apiUrl = String((qs("api-url-input") && qs("api-url-input").value) || "").trim();
          var apiKey = String((qs("api-key-input") && qs("api-key-input").value) || "").trim();
          var model = String((qs("api-model-input") && qs("api-model-input").value) || "").trim();
          if (!apiUrl || !model) {
            setStatus("请填写 API URL 与模型。", false);
            return;
          }
          try {
            localStorage.setItem(API_OVERRIDE_KEY, JSON.stringify({ apiUrl: apiUrl, apiKey: apiKey, model: model }));
            setStatus("已保存。进入主界面后会生效。", true);
            try {
              console.info("[API设置] 已保存", { apiUrl: apiUrl, apiKey: apiKey, model: model });
              if (window.GameLog && typeof window.GameLog.info === "function") {
                window.GameLog.info(
                  "[API设置] 已保存：\n" +
                    "apiUrl=" +
                    apiUrl +
                    "\n" +
                    "apiKey=" +
                    apiKey +
                    "\n" +
                    "model=" +
                    model,
                );
              }
            } catch (_logErr) {
              /* 忽略 */
            }
            refreshApiGateUi();
          } catch (e) {
            setStatus("保存失败：" + (e && e.message ? e.message : "未知错误"), false);
          }
        }

        function clearApiSettings() {
          try {
            localStorage.removeItem(API_OVERRIDE_KEY);
          } catch (_e) {
            /* 忽略 */
          }
          var u = qs("api-url-input");
          var k = qs("api-key-input");
          var m = qs("api-model-input");
          if (u) u.value = "";
          if (k) k.value = "";
          if (m) m.value = "";
          setStatus("已清除。", true);
          refreshApiGateUi();
        }

        function openSaveLoad() {
          var root = qs("save-load-root");
          if (!root) return;
          var st = qs("save-load-status");
          if (st) st.textContent = "";
          root.classList.remove("hidden");
          root.setAttribute("aria-hidden", "false");
          document.body.style.overflow = "hidden";
          renderSaveLoadList();
        }

        function closeSaveLoad() {
          var root = qs("save-load-root");
          if (!root) return;
          root.classList.add("hidden");
          root.setAttribute("aria-hidden", "true");
          document.body.style.overflow = "";
        }

        function setSaveLoadStatus(msg, ok) {
          var el = qs("save-load-status");
          if (!el) return;
          el.textContent = msg != null ? String(msg) : "";
          el.className = "splash-modal-status" + (ok ? " splash-modal-status--ok" : " splash-modal-status--bad");
        }

        function safeJsonParse(raw, fallback) {
          try {
            return JSON.parse(raw);
          } catch (_e) {
            return fallback;
          }
        }

        function readSaveIndex() {
          try {
            var raw = localStorage.getItem(SAVE_INDEX_KEY);
            var arr = raw ? safeJsonParse(raw, []) : [];
            return Array.isArray(arr) ? arr : [];
          } catch (_e) {
            return [];
          }
        }

        function writeSaveIndex(arr) {
          try {
            localStorage.setItem(SAVE_INDEX_KEY, JSON.stringify(Array.isArray(arr) ? arr : []));
          } catch (_e) {}
        }

        function fmtTime(ts) {
          var n = Number(ts);
          if (!isFinite(n) || n <= 0) return "—";
          var d = new Date(n);
          var pad = function (x) {
            return x < 10 ? "0" + x : String(x);
          };
          return (
            d.getFullYear() +
            "-" +
            pad(d.getMonth() + 1) +
            "-" +
            pad(d.getDate()) +
            " " +
            pad(d.getHours()) +
            ":" +
            pad(d.getMinutes())
          );
        }

        function renderSaveLoadList() {
          var host = qs("save-load-list");
          if (!host) return;
          host.innerHTML = "";
          var idx = readSaveIndex();
          if (!idx.length) {
            var p = document.createElement("p");
            p.className = "save-load-empty";
            p.textContent = "暂无存档。请先在「开始新人生」里创建一个存档。";
            host.appendChild(p);
            return;
          }
          idx.sort(function (a, b) {
            return Number(b && b.updatedAt) - Number(a && a.updatedAt);
          });
          for (var i = 0; i < idx.length; i++) {
            (function (it) {
              if (!it || !it.id) return;
              var row = document.createElement("div");
              row.className = "save-load-row";

              var left = document.createElement("div");
              left.className = "save-load-info";
              var nm = document.createElement("p");
              nm.className = "save-load-name";
              nm.textContent = String(it.name || it.id);
              var meta = document.createElement("p");
              meta.className = "save-load-meta";
              meta.textContent = "更新：" + fmtTime(it.updatedAt) + "  ·  创建：" + fmtTime(it.createdAt);
              left.appendChild(nm);
              left.appendChild(meta);

              var actions = document.createElement("div");
              actions.className = "save-load-actions";
              var btnLoad = document.createElement("button");
              btnLoad.type = "button";
              btnLoad.className = "splash-btn";
              btnLoad.textContent = "读取";
              btnLoad.addEventListener("click", function () {
                try {
                  var raw = localStorage.getItem(SAVE_PREFIX + String(it.id));
                  if (!raw) {
                    setSaveLoadStatus("读取失败：存档内容不存在。", false);
                    return;
                  }
                  var data = safeJsonParse(raw, null);
                  if (!data || !data.fateChoice) {
                    setSaveLoadStatus("读取失败：存档内容损坏。", false);
                    return;
                  }
                  sessionStorage.setItem(BOOTSTRAP_KEY, JSON.stringify(data));
                  sessionStorage.setItem(ACTIVE_SAVE_ID_KEY, String(it.id));
                  localStorage.setItem(ACTIVE_SAVE_ID_KEY, String(it.id));
                  window.location.href = "./main.html";
                } catch (e) {
                  setSaveLoadStatus("读取失败：" + (e && e.message ? e.message : "未知错误"), false);
                }
              });
              var btnDel = document.createElement("button");
              btnDel.type = "button";
              btnDel.className = "splash-btn splash-btn--secondary";
              btnDel.textContent = "删除";
              btnDel.addEventListener("click", function () {
                var title = "确认删除";
                var msg = "确定删除存档「" + String(it.name || it.id) + "」？\n此操作不可撤销。";
                var confirmP =
                  window.MjUiDialogs && typeof window.MjUiDialogs.confirm === "function"
                    ? window.MjUiDialogs.confirm(title, msg, { okText: "删除", cancelText: "取消" })
                    : Promise.resolve(window.confirm(msg));
                confirmP.then(function (ok) {
                  if (!ok) return;
                  try {
                    localStorage.removeItem(SAVE_PREFIX + String(it.id));
                    var idx2 = readSaveIndex().filter(function (x) {
                      return x && String(x.id || "") !== String(it.id);
                    });
                    writeSaveIndex(idx2);
                    renderSaveLoadList();
                    setSaveLoadStatus("已删除。", true);
                  } catch (e) {
                    setSaveLoadStatus("删除失败：" + (e && e.message ? e.message : "未知错误"), false);
                  }
                });
              });
              actions.appendChild(btnLoad);
              actions.appendChild(btnDel);

              row.appendChild(left);
              row.appendChild(actions);
              host.appendChild(row);
            })(idx[i]);
          }
        }

        function bindSplashUiOnce() {
          try {
            var start = qs("start-new-life-btn");
            if (start && !start._mjBound) {
              start._mjBound = true;
              start.addEventListener("click", function () {
                if (window.FateChoiceController && typeof window.FateChoiceController.show === "function") {
                  window.FateChoiceController.show();
                } else {
                  console.warn("[凡人修仙传] FateChoiceController 未加载");
                }
              });
            }

            var load = qs("load-life-btn");
            if (load && !load._mjBound) {
              load._mjBound = true;
              load.addEventListener("click", function () {
                openSaveLoad();
              });
            }

            var apiBtn = qs("api-settings-btn");
            if (apiBtn) apiBtn.disabled = false;
            if (apiBtn && !apiBtn._mjBound) {
              apiBtn._mjBound = true;
              apiBtn.addEventListener("click", openApiSettings);
              apiBtn.onclick = openApiSettings;
            }

            var root = qs("api-settings-root");
            if (root && !root._mjBound) {
              root._mjBound = true;
              root.querySelectorAll("[data-api-settings-close]").forEach(function (el) {
                el.addEventListener("click", function () {
                  closeApiSettings();
                });
              });
              root.addEventListener("keydown", function (ev) {
                if (ev.key === "Escape") {
                  closeApiSettings();
                  ev.preventDefault();
                }
              });
            }

            var saveBtn = qs("api-settings-save-btn");
            if (saveBtn && !saveBtn._mjBound) {
              saveBtn._mjBound = true;
              saveBtn.addEventListener("click", saveApiSettings);
            }
            var clearBtn = qs("api-settings-clear-btn");
            if (clearBtn && !clearBtn._mjBound) {
              clearBtn._mjBound = true;
              clearBtn.addEventListener("click", clearApiSettings);
            }
            var testBtn = qs("api-settings-test-btn");
            if (testBtn && !testBtn._mjBound) {
              testBtn._mjBound = true;
              testBtn.addEventListener("click", testApiSettings);
            }

            var saveRoot = qs("save-load-root");
            if (saveRoot && !saveRoot._mjBound) {
              saveRoot._mjBound = true;
              saveRoot.querySelectorAll("[data-save-load-close]").forEach(function (el) {
                el.addEventListener("click", function () {
                  closeSaveLoad();
                });
              });
              saveRoot.addEventListener("keydown", function (ev) {
                if (ev.key === "Escape") {
                  closeSaveLoad();
                  ev.preventDefault();
                }
              });
            }

            var refreshBtn = qs("save-load-refresh-btn");
            if (refreshBtn && !refreshBtn._mjBound) {
              refreshBtn._mjBound = true;
              refreshBtn.addEventListener("click", function () {
                renderSaveLoadList();
              });
            }
            var delAllBtn = qs("save-load-delete-all-btn");
            if (delAllBtn && !delAllBtn._mjBound) {
              delAllBtn._mjBound = true;
              delAllBtn.addEventListener("click", function () {
                var title = "确认清空";
                var msg = "确定清空全部存档？\n此操作不可撤销。";
                var confirmP =
                  window.MjUiDialogs && typeof window.MjUiDialogs.confirm === "function"
                    ? window.MjUiDialogs.confirm(title, msg, { okText: "清空", cancelText: "取消" })
                    : Promise.resolve(window.confirm(msg));
                confirmP.then(function (ok) {
                  if (!ok) return;
                  try {
                    var idx3 = readSaveIndex();
                    for (var i2 = 0; i2 < idx3.length; i2++) {
                      if (idx3[i2] && idx3[i2].id) localStorage.removeItem(SAVE_PREFIX + String(idx3[i2].id));
                    }
                    writeSaveIndex([]);
                    renderSaveLoadList();
                    setSaveLoadStatus("已清空。", true);
                  } catch (e) {
                    setSaveLoadStatus("清空失败：" + (e && e.message ? e.message : "未知错误"), false);
                  }
                });
              });
            }

            // 初始门禁：未配置 API 时禁用开始/读取
            refreshApiGateUi();
          } catch (e) {
            try {
              console.error("[启动页] 绑定按钮失败", e);
              if (window.GameLog && typeof window.GameLog.warn === "function") {
                window.GameLog.warn("[启动页] 绑定按钮失败：" + (e && e.message ? e.message : e));
              }
            } catch (_e2) {}
          }
        }

        // 自定义 confirm / prompt（Promise 形式），供其它模块调用
        (function installDialogs() {
          function el(id) {
            return document.getElementById(id);
          }
          var root = el("mj-dialog-root");
          if (!root) return;
          var titleEl = el("mj-dialog-title");
          var msgEl = el("mj-dialog-message");
          var field = el("mj-dialog-field");
          var input = el("mj-dialog-input");
          var hintEl = el("mj-dialog-hint");
          var okBtn = el("mj-dialog-ok-btn");
          var cancelBtn = el("mj-dialog-cancel-btn");

          var active = null; // { resolve, mode, validate }

          function close(result) {
            if (!active) return;
            var cur = active;
            active = null;
            root.classList.add("hidden");
            root.setAttribute("aria-hidden", "true");
            document.body.style.overflow = "";
            try {
              if (input) input.oninput = null;
            } catch (_e0) {}
            try {
              cur.resolve(result);
            } catch (_e) {}
          }

          function setHint(text) {
            if (!hintEl) return;
            var t = text != null ? String(text) : "";
            hintEl.textContent = t;
            hintEl.classList.toggle("hidden", !t);
          }

          function setOkEnabled(enabled) {
            if (!okBtn) return;
            okBtn.disabled = !enabled;
          }

          function open(opts) {
            var o = opts || {};
            var mode = o.mode === "prompt" ? "prompt" : "confirm";
            if (titleEl) titleEl.textContent = o.title != null ? String(o.title) : "提示";
            if (msgEl) msgEl.textContent = o.message != null ? String(o.message) : "";
            if (field) field.classList.toggle("hidden", mode !== "prompt");
            if (input) {
              input.type = o.inputType ? String(o.inputType) : "text";
              input.value = o.defaultValue != null ? String(o.defaultValue) : "";
              input.placeholder = o.placeholder != null ? String(o.placeholder) : "";
            }
            if (cancelBtn) cancelBtn.textContent = o.cancelText != null ? String(o.cancelText) : "取消";
            if (okBtn) okBtn.textContent = o.okText != null ? String(o.okText) : "确定";
            setHint("");
            setOkEnabled(true);

            root.classList.remove("hidden");
            root.setAttribute("aria-hidden", "false");
            document.body.style.overflow = "hidden";
            window.setTimeout(function () {
              try {
                if (mode === "prompt" && input) input.focus();
                else if (okBtn) okBtn.focus();
              } catch (_e) {}
            }, 0);

            return new Promise(function (resolve) {
              active = { resolve: resolve, mode: mode, validate: typeof o.validate === "function" ? o.validate : null };
            });
          }

          // 事件绑定（只绑一次）
          if (!root._mjBound) {
            root._mjBound = true;
            root.querySelectorAll("[data-mj-dialog-close]").forEach(function (n) {
              n.addEventListener("click", function () {
                close(active && active.mode === "prompt" ? null : false);
              });
            });
            if (cancelBtn) {
              cancelBtn.addEventListener("click", function () {
                close(active && active.mode === "prompt" ? null : false);
              });
            }
            if (okBtn) {
              okBtn.addEventListener("click", function () {
                if (okBtn.disabled) return;
                if (active && active.mode === "prompt") {
                  close(input ? String(input.value || "") : "");
                } else {
                  close(true);
                }
              });
            }
            root.addEventListener("keydown", function (ev) {
              if (ev.key === "Escape") {
                close(active && active.mode === "prompt" ? null : false);
                ev.preventDefault();
              } else if (ev.key === "Enter" && active && active.mode === "prompt") {
                if (okBtn && okBtn.disabled) return;
                close(input ? String(input.value || "") : "");
                ev.preventDefault();
              }
            });
          }

          function applyValidate() {
            if (!active || active.mode !== "prompt") return;
            var vfn = active.validate;
            if (!vfn) return;
            var val = input ? String(input.value || "") : "";
            var res = null;
            try {
              res = vfn(val);
            } catch (_e) {
              res = null;
            }
            if (!res || typeof res !== "object") {
              setOkEnabled(true);
              setHint("");
              return;
            }
            if (res.okEnabled === false) setOkEnabled(false);
            else setOkEnabled(true);
            setHint(res.hint != null ? String(res.hint) : "");
          }

          try {
            window.MjUiDialogs = window.MjUiDialogs || {};
            window.MjUiDialogs.confirm = function (title, message, opts) {
              return open(Object.assign({}, opts || {}, { mode: "confirm", title: title, message: message }));
            };
            window.MjUiDialogs.prompt = function (title, message, opts) {
              var p = open(Object.assign({}, opts || {}, { mode: "prompt", title: title, message: message }));
              try {
                if (input) {
                  input.oninput = function () {
                    applyValidate();
                  };
                }
                applyValidate();
              } catch (_e3) {}
              return p;
            };
          } catch (_e2) {}
        })();

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", bindSplashUiOnce, { once: true });
        } else {
          bindSplashUiOnce();
        }
      })();
    </script>
  </body>
</html>
